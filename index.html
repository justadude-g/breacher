<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breacher // OPFOR Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto+Condensed:wght@300;400;700&family=Oswald:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  /* ── THEMES ─────────────────────────────────────────────── */
  :root {
    --bg: #eaeaec;
    --panel: #f5f5f6;
    --panel2: #ebebed;
    --border: #c8c8ce;
    --red: #c0392b;
    --red-bright: #e74c3c;
    --red-dim: #f5c6c2;
    --amber: #b07d10;
    --text: #1a1a1e;
    --text-dim: #4a4a52;
    --text-faint: #8a8a94;
    --green: #1e8449;
    --accent: #1a6fad;
  }

  html.theme-dark {
    --bg: #0d0d0f;
    --panel: #141418;
    --panel2: #1a1a20;
    --border: #2a2a35;
    --red: #c0392b;
    --red-bright: #e74c3c;
    --red-dim: #7b1c12;
    --amber: #d4a017;
    --text: #e8e6e0;
    --text-dim: #888882;
    --text-faint: #444440;
    --green: #27ae60;
    --accent: #3d8fd1;
  }

  /* Smooth theme transition */
  *, *::before, *::after {
    transition: background-color 0.2s ease, border-color 0.2s ease, color 0.15s ease;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(180deg, #e0e0e2 0%, var(--bg) 100%);
    border-bottom: 2px solid var(--red);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: var(--text);
  }
  .logo span { color: var(--red-bright); }

  .fop-counter {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .fop-label {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .fop-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    line-height: 1;
    color: var(--red-bright);
    min-width: 60px;
    text-align: right;
  }

  .fop-budget-wrap {
    text-align: right;
  }

  .budget-input-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 2px;
  }

  .budget-label {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-faint);
    text-transform: uppercase;
  }

  #budget-input {
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    width: 52px;
    text-align: center;
    padding: 2px 4px;
    outline: none;
  }

  #budget-input:focus { border-color: var(--red); }

  .remaining-label {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  .remaining-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    transition: color 0.2s;
  }

  .remaining-val.ok { color: var(--green); }
  .remaining-val.warn { color: var(--amber); }
  .remaining-val.over { color: var(--red-bright); }

  /* LAYOUT */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: calc(100vh - 64px);
  }

  /* LEFT: UNIT LIBRARY */
  .sidebar {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--panel2);
  }

  .sidebar-title {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .filter-tabs {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .filter-tab {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-tab:hover { border-color: var(--red-dim); color: var(--text); }
  .filter-tab.active { background: var(--red); border-color: var(--red); color: #fff; }

  .unit-list {
    overflow-y: auto;
    flex: 1;
    padding: 8px;
  }

  .unit-card {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    padding: 10px 12px;
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }

  .unit-card:hover {
    border-left-color: var(--red);
    background: #dddde0;
  }

  .unit-card.type-street-thug { border-left-color: #555; }
  .unit-card.type-militia { border-left-color: var(--amber); }
  .unit-card.type-trained { border-left-color: var(--accent); }
  .unit-card.type-hired-gun { border-left-color: var(--red-bright); }
  .unit-card.type-named-hg { border-left-color: #c471ed; }

  .unit-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .unit-name {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .unit-fop-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--red-bright);
    white-space: nowrap;
  }

  .unit-fop-badge small {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--text-dim);
    vertical-align: middle;
  }

  .unit-stats-mini {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .stat-pill {
    font-size: 10px;
    color: var(--text-dim);
    display: flex;
    gap: 3px;
  }

  .stat-pill-label {
    font-family: 'Oswald', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-faint);
    font-size: 9px;
  }

  .stat-pill-val {
    font-weight: 700;
    color: var(--text);
  }

  .unit-tags {
    display: flex;
    gap: 4px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-family: 'Oswald', sans-serif;
    font-size: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 5px;
    border: 1px solid;
  }

  .tag-ind { border-color: var(--accent); color: var(--accent); }
  .tag-coord { border-color: var(--amber); color: var(--amber); }
  .tag-concealed { border-color: var(--green); color: var(--green); }
  .tag-hg { border-color: var(--red-bright); color: var(--red-bright); }

  .add-btn {
    position: absolute;
    right: 10px;
    bottom: 10px;
    background: var(--red);
    border: none;
    color: #fff;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 3px 10px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .add-btn:hover { background: var(--red-bright); }

  /* RIGHT: ROSTER */
  .roster-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .roster-header {
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--panel2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .roster-title {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .roster-actions {
    display: flex;
    gap: 8px;
  }

  .action-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .action-btn:hover { border-color: var(--red-dim); color: var(--text); }
  .action-btn.danger:hover { border-color: var(--red); background: var(--red-dim); color: #fff; }
  .action-btn.primary { background: var(--red); border-color: var(--red); color: #fff; }
  .action-btn.primary:hover { background: var(--red-bright); }

  .roster-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
  }

  .roster-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-faint);
    gap: 10px;
  }

  .roster-empty-icon {
    font-size: 48px;
    opacity: 0.3;
  }

  .roster-empty-text {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ROSTER UNIT ENTRY */
  .roster-entry {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 4px solid var(--red-dim);
    margin-bottom: 10px;
    overflow: hidden;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .roster-entry.type-street-thug { border-left-color: #555; }
  .roster-entry.type-militia { border-left-color: var(--amber); }
  .roster-entry.type-trained { border-left-color: var(--accent); }
  .roster-entry.type-hired-gun { border-left-color: var(--red-bright); }
  .roster-entry.type-named-hg { border-left-color: #c471ed; }

  .entry-header {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    background: var(--panel2);
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }

  .entry-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--text-faint);
    min-width: 24px;
  }

  .entry-name {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    flex: 1;
  }

  .entry-type-badge {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    border: 1px solid var(--border);
    padding: 2px 6px;
  }

  .entry-fop {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--red-bright);
    min-width: 40px;
    text-align: right;
  }

  .entry-fop small {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    color: var(--text-faint);
    letter-spacing: 1px;
  }

  .remove-btn {
    background: transparent;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    transition: color 0.15s;
    line-height: 1;
  }

  .remove-btn:hover { color: var(--red-bright); }

  .entry-body {
    padding: 10px 14px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .entry-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
  }

  .stat-box {
    text-align: center;
    background: #e8e8eb;
    padding: 6px 4px;
    border: 1px solid var(--border);
  }

  .stat-box-label {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-faint);
    display: block;
    margin-bottom: 2px;
    white-space: nowrap;
  }

  .stat-box-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    line-height: 1;
    color: var(--text);
  }

  .entry-config {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .config-section-label {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 3px;
  }

  .config-row {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .config-select {
    background: #e8e8eb;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Roboto Condensed', sans-serif;
    font-size: 12px;
    padding: 4px 6px;
    flex: 1;
    min-width: 0;
    outline: none;
    cursor: pointer;
  }

  .config-select:focus { border-color: var(--red-dim); }

  .model-count-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .model-count-label {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    letter-spacing: 1px;
    color: var(--text-faint);
    text-transform: uppercase;
  }

  .counter-btn {
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 22px;
    height: 22px;
    font-size: 14px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
  }

  .counter-btn:hover { background: var(--red); border-color: var(--red); color: #fff; }

  .model-count-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    min-width: 20px;
    text-align: center;
  }

  .entry-upgrades {
    grid-column: 1 / -1;
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding-top: 6px;
    border-top: 1px solid var(--border);
  }

  .upgrade-toggle {
    background: #e8e8eb;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .upgrade-toggle:hover { border-color: var(--red-dim); }
  .upgrade-toggle.active { background: var(--red-dim); border-color: var(--red); color: var(--text); }

  .upgrade-cost { color: var(--amber); margin-left: 4px; }

  /* WEAPON PROFILE TOOLTIP */
  .weapon-profile-row {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    padding: 3px 6px;
    background: #dedede;
    border-left: 2px solid var(--border);
  }

  .weapon-profile-row .wp-name { color: var(--text); font-weight: 700; }
  .weapon-profile-row .wp-dmg { color: var(--amber); }
  .weapon-profile-row .wp-mode { color: var(--accent); font-size: 10px; }
  .weapon-profile-row .wp-range { font-size: 10px; }

  /* VALIDATION ALERTS */
  .roster-footer {
    border-top: 1px solid var(--border);
    background: var(--panel2);
    padding: 10px 16px;
  }

  .alerts {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 8px;
  }

  .alert {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 8px;
    border-left: 3px solid;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .alert-warn { border-color: var(--amber); color: var(--amber); background: rgba(212,160,23,0.08); }
  .alert-ok { border-color: var(--green); color: var(--green); background: rgba(39,174,96,0.08); }
  .alert-error { border-color: var(--red-bright); color: var(--red-bright); background: rgba(231,76,60,0.08); }

  .footer-summary {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .summary-stat {
    display: flex;
    flex-direction: column;
  }

  .summary-stat-label {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  .summary-stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    line-height: 1.1;
    color: var(--text);
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--red-dim); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }

  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: 3px solid var(--red);
    width: 560px;
    max-width: 95vw;
    max-height: 85vh;
    overflow-y: auto;
  }

  .modal-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    transition: color 0.15s;
  }

  .modal-close:hover { color: var(--red-bright); }

  .modal-body {
    padding: 16px 20px;
  }

  .modal-section {
    margin-bottom: 16px;
  }

  .modal-section-title {
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--red);
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
    margin-bottom: 8px;
  }

  .modal-stat-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 6px;
    margin-bottom: 8px;
  }

  .modal-stat {
    text-align: center;
    background: #e8e8eb;
    border: 1px solid var(--border);
    padding: 6px 4px;
  }

  .modal-stat label {
    display: block;
    font-family: 'Oswald', sans-serif;
    font-size: 8px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 2px;
  }

  .modal-stat span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--text);
  }

  .modal-rules-text {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.6;
    background: #e8e8eb;
    border: 1px solid var(--border);
    padding: 8px 10px;
  }

  .weapon-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11px;
  }

  .weapon-table th {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-faint);
    text-align: left;
    padding: 4px 6px;
    border-bottom: 1px solid var(--border);
  }

  .weapon-table td {
    padding: 5px 6px;
    border-bottom: 1px solid #d0d0d4;
    color: var(--text-dim);
    vertical-align: top;
  }

  .weapon-table tr:hover td { background: #dcdcdf; }

  .wt-name { color: var(--text); font-weight: 700; }
  .wt-dmg { color: var(--amber); }
  .wt-mode { color: var(--accent); font-size: 10px; }


  /* EQUIP MODE TOGGLE */
  .equip-mode-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .equip-mode-label {
    font-family: 'Oswald', sans-serif;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-faint);
  }

  .equip-mode-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'Oswald', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    cursor: pointer;
    transition: all 0.12s;
  }

  .equip-mode-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

      </div>
      <div class="unit-tags">${indTag}${coordTag}${concTag}${hgTag}</div>
      <button class="add-btn" onclick="addUnit('${unit.id}');event.stopPropagation();">+ ADD</button>
    `;

    card.addEventListener('click', () => showUnitInfo(unit));
    container.appendChild(card);
  });
}

// ============================================================
// ADD / REMOVE UNIT
// ============================================================
function addUnit(unitId) {
  const allUnits = [...UNITS, ...PREMADE_HG];
  const template = allUnits.find(u => u.id === unitId);
  if (!template) return;

  // Street Thug 50% FOP cap — block adding if minimum cost already exceeds cap
  if (template.id === 'street-thug') {
    const minCost = template.fopPerModel * (template.coordinated ? template.coordinated[0] : 1);
    const alreadySpent = streetThugFOPUsed(-1); // -1 = exclude nothing (no existing entry yet)
    if (alreadySpent + minCost > budget * 0.5) {
      // Flash alert instead of silently ignoring
      const alertsEl = document.getElementById('alerts');
      const prev = alertsEl.innerHTML;
      alertsEl.innerHTML = `<div class="alert alert-error">Street Thugs are at the 50% FOP cap (${Math.floor(budget*0.5)} FOP max). Cannot add more.</div>`;
      setTimeout(() => { alertsEl.innerHTML = prev; }, 3000);
      return;
    }
  }

  // Determine default formation
  // Street Thug: coord only. Hired Gun: ind only. Militia/Trained: both — default to coordinated.
  const defaultFormation = (!template.individual) ? 'coordinated'
    : (!template.coordinated) ? 'individual'
    : 'coordinated';

  const defaultModels = defaultFormation === 'coordinated' && template.coordinated
    ? template.coordinated[0]
    : 1;

  const entry = {
    uid: nextId++,
    templateId: unitId,
    template: template,
    formation: defaultFormation,
    models: defaultModels,
    selectedPrimary: template.defaultWeapons?.primary ?? null,
    selectedSecondary: template.defaultWeapons?.secondary ?? null,
    selectedMelee: template.defaultWeapons?.melee ?? template.availableWeapons.melee?.[0] ?? null,
    selectedMelee2: template.defaultWeapons?.melee2 ?? ((template.type === 'hired-gun' || template.type === 'named-hg') ? 'Fists and Kicks' : null),
    selectedSupport: null,
    activeUpgrades: {},
    equipMode: 'all',      // 'all' or 'individual'
    modelWeapons: [],      // array of per-model weapon objects when equipMode === 'individual'
  };

  roster.push(entry);
  renderRoster();
  updateFOP();
}


// ============================================================
// EQUIP MODE (per-model weapons for coordinated OPFOR units)
// ============================================================

function buildModelWeapons(entry) {
  // Initialise modelWeapons array to match current model count
  const t = entry.template;
  const count = entry.formation === 'individual' ? 1 : entry.models;
  const existing = entry.modelWeapons || [];
  const result = [];
  for (let i = 0; i < count; i++) {
    result.push({
      primary:   existing[i]?.primary   ?? entry.selectedPrimary   ?? null,
      secondary: existing[i]?.secondary ?? entry.selectedSecondary ?? null,
      melee:     existing[i]?.melee     ?? entry.selectedMelee     ?? null,
    });
  }
  entry.modelWeapons = result;
}

function setEquipMode(uid, mode) {
  const entry = roster.find(e => e.uid === uid);
  if (!entry) return;
  entry.equipMode = mode;
  if (mode === 'individual') buildModelWeapons(entry);
  renderRoster();
}

function updateModelWeapon(uid, modelIdx, slot, value) {
  const entry = roster.find(e => e.uid === uid);
  if (!entry || !entry.modelWeapons[modelIdx]) return;
  entry.modelWeapons[modelIdx][slot] = value || null;
  renderRoster();
}

function renderEquipAll(entry, uid, t, primaryOpts, meleeOpts, secondaryOpts, supportOpts, isCoord) {
  const isHG = t.type === 'hired-gun' || t.type === 'named-hg';
  let html = '';
  if (primaryOpts) html += `
    <div>
      <div class="config-section-label">Primary</div>
      <div class="config-row">
        <select class="config-select" onchange="updateWeapon(${uid},'primary',this.value)"><option value="">— None —</option>${primaryOpts}</select>
      </div>
      ${entry.selectedPrimary ? renderWeaponProfile(entry.selectedPrimary) : ''}
    </div>`;
  if (meleeOpts) html += `
    <div>
      <div class="config-section-label">Melee 1</div>
      <div class="config-row">
        <select class="config-select" onchange="updateWeapon(${uid},'melee',this.value)">${meleeOpts}</select>
      </div>
      ${entry.selectedMelee ? renderWeaponProfile(entry.selectedMelee) : ''}
    </div>`;
  if (meleeOpts && isHG) {
    const melee2Opts = (t.availableWeapons.melee || []).map(w =>
      `<option value="${w}" ${entry.selectedMelee2===w?'selected':''}>${w}</option>`).join('');
    html += `
    <div>
      <div class="config-section-label">Melee 2</div>
      <div class="config-row">
        <select class="config-select" onchange="updateWeapon(${uid},'melee2',this.value)"><option value="">— None —</option>${melee2Opts}</select>
      </div>
      ${entry.selectedMelee2 ? renderWeaponProfile(entry.selectedMelee2) : ''}
    </div>`;
  }
  if (secondaryOpts) html += `
    <div>
      <div class="config-section-label">Secondary</div>
      <div class="config-row">
        <select class="config-select" onchange="updateWeapon(${uid},'secondary',this.value)"><option value="">— None —</option>${secondaryOpts}</select>
      </div>
      ${entry.selectedSecondary ? renderWeaponProfile(entry.selectedSecondary) : ''}
    </div>`;
  if (supportOpts && !t.premade && (isHG || (isCoord && (t.id !== 'militia' || entry.models >= 3) && (t.id !== 'trained' || entry.models >= 2)))) html += `
    <div>
      <div class="config-section-label">Support <span style="color:var(--amber)">(+FOP)</span></div>
      <div class="config-row">
        <select class="config-select" onchange="updateWeapon(${uid},'support',this.value)">
          <option value="">— None —</option>${supportOpts}
        </select>
      </div>
      ${entry.selectedSupport ? renderWeaponProfile(entry.selectedSupport) : ''}
    </div>`;
  return html;
}

function renderEquipIndividual(entry, uid, t, primaryPool, meleePool, secondaryPool) {
  buildModelWeapons(entry);
  let html = '';
  entry.modelWeapons.forEach((mw, idx) => {
    const pOpts = (primaryPool || []).map(w =>
      `<option value="${w}" ${mw.primary===w?'selected':''}>${w}</option>`).join('');
    const mOpts = (meleePool || []).map(w =>
      `<option value="${w}" ${mw.melee===w?'selected':''}>${w}</option>`).join('');
    const sOpts = (secondaryPool || []).map(w =>
      `<option value="${w}" ${mw.secondary===w?'selected':''}>${w}</option>`).join('');

    html += `<div class="model-weapon-row">
      <div class="model-weapon-label">Model ${idx + 1}</div>`;

    if (pOpts) html += `
      <div style="margin-bottom:4px;">
        <div class="config-section-label">Primary</div>
        <select class="config-select" style="width:100%;" onchange="updateModelWeapon(${uid},${idx},'primary',this.value)">
          <option value="">— None —</option>${pOpts}
        </select>
        ${mw.primary ? renderWeaponProfile(mw.primary) : ''}
      </div>`;

    if (mOpts) html += `
      <div style="margin-bottom:4px;">
        <div class="config-section-label">Melee</div>
        <select class="config-select" style="width:100%;" onchange="updateModelWeapon(${uid},${idx},'melee',this.value)">
          ${mOpts}
        </select>
        ${mw.melee ? renderWeaponProfile(mw.melee) : ''}
      </div>`;

    if (sOpts) html += `
      <div>
        <div class="config-section-label">Secondary</div>
        <select class="config-select" style="width:100%;" onchange="updateModelWeapon(${uid},${idx},'secondary',this.value)">
          <option value="">— None —</option>${sOpts}
        </select>
        ${mw.secondary ? renderWeaponProfile(mw.secondary) : ''}
      </div>`;

    html += `</div>`;
  });
  return html;
}

function removeUnit(uid) {
  roster = roster.filter(e => e.uid !== uid);
  renderRoster();
  updateFOP();
}

function clearRoster() {
  if (roster.length === 0) return;
  if (confirm('Clear the entire roster?')) {
    roster = [];
    renderRoster();
    updateFOP();
  }
}

function setFormation(uid, formation) {
  const entry = roster.find(e => e.uid === uid);
  if (!entry) return;
  entry.formation = formation;
  const t = entry.template;
  if (formation === 'individual') {
    entry.models = 1;
    entry.selectedSupport = null;
    entry.equipMode = 'all';
    entry.modelWeapons = [];
    // Clear any coord-only upgrades
    (t.upgrades || []).filter(u => u.coordOnly).forEach(u => {
      entry.activeUpgrades[u.id] = false;
    });
  } else {
    entry.models = t.coordinated ? t.coordinated[0] : 1;
    // Clear any ind-only upgrades
    (t.upgrades || []).filter(u => u.indOnly).forEach(u => {
      entry.activeUpgrades[u.id] = false;
    });
  }
  renderRoster();
}

// ============================================================
// CALCULATE FOP
// ============================================================
function calcEntryFOP(entry) {
  const t = entry.template;
  const models = entry.formation === 'individual' ? 1 : entry.models;
  let fop = t.fopPerModel * models;

  // Upgrades
  if (entry.activeUpgrades['cohesion']) fop += 1;
  if (entry.activeUpgrades['armor2']) fop += 1 * models;
  if (entry.activeUpgrades['armor3']) fop += 2;

  // Concealed — Trained (IND): +2 FOP per model; Hired Gun: +2 FOP
  if (entry.activeUpgrades['concealed']) {
    if (t.id === 'trained') fop += 2 * models;
    else fop += 2; // Hired Gun flat +2
  }

  // Support weapon costs +1 FOP
  // Coordinated units: any selected support weapon
  // Hired Gun (individual): also +1 FOP
  if (entry.selectedSupport) {
    const isHiredGun = t.type === 'hired-gun' || t.type === 'named-hg';
    if (isHiredGun || entry.formation === 'coordinated') fop += 1;
  }

  // Hired Gun weapon CE modifier → FOP cost
  if (t.type === 'hired-gun' || t.type === 'named-hg') {
    const weaponKeys = [entry.selectedPrimary, entry.selectedSupport, entry.selectedSecondary].filter(Boolean);
    weaponKeys.forEach(wName => {
      const w = WEAPONS[wName];
      if (w && w.ce > 0) fop += w.ce;
    });
  }

  return fop;
}

function updateFOP() {
  const total = roster.reduce((sum, e) => sum + calcEntryFOP(e), 0);
  const remaining = budget - total;

  document.getElementById('total-fop').textContent = total;
  const remEl = document.getElementById('remaining-val');
  remEl.textContent = remaining;
  remEl.className = 'remaining-val ' + (remaining < 0 ? 'over' : remaining <= 3 ? 'warn' : 'ok');

  renderAlerts(total, remaining);
  renderFooterSummary(total);
}

// ============================================================
// RENDER ROSTER
// ============================================================
function renderRoster() {
  const container = document.getElementById('roster-list');
  const emptyEl = document.getElementById('roster-empty');

  if (roster.length === 0) {
    emptyEl.style.display = 'flex';
    container.innerHTML = '';
    container.appendChild(emptyEl);
    updateFOP();
    return;
  }

  emptyEl.style.display = 'none';

  // Rebuild DOM entries
  const existing = {};
  container.querySelectorAll('.roster-entry').forEach(el => {
    existing[el.dataset.uid] = el;
  });

  // Remove entries not in roster
  Object.keys(existing).forEach(uid => {
    if (!roster.find(e => e.uid == uid)) existing[uid].remove();
  });

  roster.forEach((entry, idx) => {
    const t = entry.template;
    const fop = calcEntryFOP(entry);
    const uid = entry.uid;

    let el = container.querySelector(`.roster-entry[data-uid="${uid}"]`);
    if (!el) {
      el = document.createElement('div');
      el.className = `roster-entry type-${t.type}`;
      el.dataset.uid = uid;
      container.appendChild(el);
    }

    // Build stats HTML
    const statsHtml = `
      <div class="stat-box"><span class="stat-box-label">Movement</span><span class="stat-box-val">${t.stats.MOV}</span></div>
      <div class="stat-box"><span class="stat-box-label">Ranged Combat</span><span class="stat-box-val">${t.stats.RC}</span></div>
      <div class="stat-box"><span class="stat-box-label">Melee Combat</span><span class="stat-box-val">${t.stats.MC}</span></div>
      <div class="stat-box"><span class="stat-box-label">Technical</span><span class="stat-box-val">${t.stats.TECH}</span></div>
      <div class="stat-box"><span class="stat-box-label">Wounds</span><span class="stat-box-val">${t.stats.WND}</span></div>
      <div class="stat-box"><span class="stat-box-label">Armor</span><span class="stat-box-val">${t.stats.ARM + (entry.activeUpgrades['armor2'] ? 2 : 0) + (entry.activeUpgrades['armor3'] ? 2 : 0)}</span></div>
    `;

    // Formation toggle (only for units that support both)
    const canToggleFormation = t.individual && t.coordinated && !t.premade;
    const isCoord = entry.formation === 'coordinated';
    const isInd = entry.formation === 'individual';

    let formationHtml = '';
    if (canToggleFormation) {
      formationHtml = `
        <div class="formation-toggle">
          <button class="form-btn ${isInd ? 'active-ind' : ''}" onclick="setFormation(${uid},'individual')">IND</button>
          <button class="form-btn ${isCoord ? 'active-coord' : ''}" onclick="setFormation(${uid},'coordinated')">COORD</button>
        </div>
      `;
    } else if (!t.individual && t.coordinated) {
      formationHtml = `<span class="formation-fixed coord-only">COORD ONLY</span>`;
    } else if (t.individual && !t.coordinated) {
      formationHtml = `<span class="formation-fixed ind-only">IND ONLY</span>`;
    }

    // Model count — clamp based on formation
    const modelCountHtml = (() => {
      if (t.premade) return `<div class="model-count-wrap"><span class="model-count-label">Models:</span><span class="model-count-val">1</span></div>`;
      if (isInd) return `<div class="model-count-wrap"><span class="model-count-label">Models:</span><span class="model-count-val">1</span></div>`;
      // Coordinated
      const coordMin = t.coordinated ? t.coordinated[0] : 1;
      const coordMax = t.coordinated ? t.coordinated[1] : 1;
      return `
        <div class="model-count-wrap">
          <span class="model-count-label">Models (${coordMin}–${coordMax}):</span>
          <button class="counter-btn" onclick="changeModels(${uid},-1)">−</button>
          <span class="model-count-val" id="mc-${uid}">${entry.models}</span>
          <button class="counter-btn" onclick="changeModels(${uid},1)">+</button>
        </div>
      `;
    })();

    // Weapon selects
    const primaryPool   = t.availableWeapons.primary   || [];
    const secondaryPool = t.availableWeapons.secondary || [];
    const meleePool     = t.availableWeapons.melee     || [];
    const supportPool   = t.availableWeapons.support   || [];

    const primaryOpts   = primaryPool.map(w =>   `<option value="${w}" ${entry.selectedPrimary===w?'selected':''}>${w}</option>`).join('');
    const secondaryOpts = secondaryPool.map(w => `<option value="${w}" ${entry.selectedSecondary===w?'selected':''}>${w}</option>`).join('');
    const meleeOpts     = meleePool.map(w =>     `<option value="${w}" ${entry.selectedMelee===w?'selected':''}>${w}</option>`).join('');
    const supportOpts   = supportPool.map(w =>   `<option value="${w}" ${entry.selectedSupport===w?'selected':''}>${w}</option>`).join('');

    // Equip mode toggle — only for multi-model coordinated units (not Hired Guns or premade)
    const canEquipIndividual = !t.premade && isCoord && entry.models > 1 &&
      ['street-thug', 'militia', 'trained'].includes(t.id);

    let equipModeHtml = '';
    if (canEquipIndividual) {
      const modeAll = entry.equipMode !== 'individual';
      equipModeHtml = `<div class="equip-mode-wrap">
        <span class="equip-mode-label">Equip:</span>
        <button class="equip-mode-btn ${modeAll ? 'active' : ''}" onclick="setEquipMode(${uid},'all')">All</button>
        <button class="equip-mode-btn ${!modeAll ? 'active' : ''}" onclick="setEquipMode(${uid},'individual')">Individual</button>
      </div>`;
    }

    let weaponHtml = equipModeHtml;

    if (!canEquipIndividual || entry.equipMode !== 'individual') {
      // Equip All mode (default)
      weaponHtml += renderEquipAll(entry, uid, t, primaryOpts, meleeOpts, secondaryOpts, supportOpts, isCoord);
    } else {
      // Equip Individual mode
      weaponHtml += renderEquipIndividual(entry, uid, t, primaryPool, meleePool, secondaryPool);
      // Still show support weapon selector at unit level if applicable
      if (supportOpts && (isCoord && (t.id !== 'militia' || entry.models >= 3) && (t.id !== 'trained' || entry.models >= 2))) {
        weaponHtml += `<div style="margin-top:6px;">
          <div class="config-section-label">Support <span style="color:var(--amber)">(+FOP — unit level)</span></div>
          <div class="config-row">
            <select class="config-select" onchange="updateWeapon(${uid},'support',this.value)">
              <option value="">— None —</option>${supportOpts}
            </select>
          </div>
          ${entry.selectedSupport ? renderWeaponProfile(entry.selectedSupport) : ''}
        </div>`;
      }
    }

    // Upgrades — filter out coordOnly upgrades when unit is Individual
    let upgradeHtml = '';
    const visibleUpgrades = (t.upgrades || []).filter(upg => {
      if (upg.coordOnly && !isCoord) return false;
      if (upg.indOnly  && !isInd)   return false;
      return true;
    });
    if (visibleUpgrades.length > 0) {
      upgradeHtml = `<div class="entry-upgrades">`;
      visibleUpgrades.forEach(upg => {
        const isActive = !!entry.activeUpgrades[upg.id];
        const costLabel = upg.cost > 0 ? `+${upg.cost} FOP` : '';
        upgradeHtml += `<button class="upgrade-toggle ${isActive?'active':''}" onclick="toggleUpgrade(${uid},'${upg.id}')">
          ${upg.label}${costLabel ? ` <span class="upgrade-cost">${costLabel}</span>` : ''}
        </button>`;
      });
      upgradeHtml += `</div>`;
    }

    // CE weapon cost badge for Hired Guns
    let ceFopBadge = '';
    if (t.type === 'hired-gun' || t.type === 'named-hg') {
      const weaponKeys = [entry.selectedPrimary, entry.selectedSupport, entry.selectedSecondary].filter(Boolean);
      const totalCE = weaponKeys.reduce((sum, wName) => {
        const w = WEAPONS[wName];
        return sum + (w && w.ce > 0 ? w.ce : 0);
      }, 0);
      if (totalCE > 0) {
        ceFopBadge = `<span style="font-family:Oswald,sans-serif;font-size:9px;letter-spacing:1px;color:var(--amber);border:1px solid var(--amber);padding:2px 5px;">+${totalCE} FOP (weapon CE)</span>`;
      }
    }

    el.innerHTML = `
      <div class="entry-header">
        <span class="entry-num">${idx+1}</span>
        <span class="entry-name">${t.name}</span>
        ${formationHtml}
        ${modelCountHtml}
        ${ceFopBadge}
        <div class="entry-fop">${fop}<small> FOP</small></div>
        <button class="remove-btn" onclick="removeUnit(${uid})" title="Remove">✕</button>
      </div>
      <div class="entry-body">
        <div class="entry-stats">${statsHtml}</div>
        <div class="entry-config">${weaponHtml}</div>
        ${upgradeHtml}
      </div>
    `;
  });

  updateFOP();
}

function renderWeaponProfile(weaponName) {
  const w = WEAPONS[weaponName];
  if (!w) return '';
  const ceBadge = w.ce ? `<span style="font-family:Oswald,sans-serif;font-size:9px;letter-spacing:1px;color:var(--amber);border:1px solid var(--amber);padding:0 3px;margin-left:4px;">+${w.ce} CE</span>` : '';
  if (w.type === 'melee') {
    return `<div class="weapon-profile-row">
      <span class="wp-mode">${w.modes}</span> &nbsp;
      <span class="wp-dmg">${w.damage}</span> &nbsp;
      <span class="wp-range">Range: ${w.short}</span>${ceBadge}
    </div>`;
  }
  if (w.type === 'support') {
    const special = w.special ? ` &nbsp;<span style="font-size:10px;color:var(--text-dim);">${w.special}</span>` : '';
    return `<div class="weapon-profile-row">
      <span class="wp-mode">${w.modes}</span> &nbsp;
      <span class="wp-dmg">${w.damage}</span> &nbsp;
      <span class="wp-range">S:${w.short} M:${w.medium} L:${w.long}</span>${special}${ceBadge}
    </div>`;
  }
  const catBadge = w.category ? `<span style="font-family:Oswald,sans-serif;font-size:9px;letter-spacing:1px;color:var(--text-dim);border:1px solid var(--border);padding:0 3px;margin-left:4px;">${w.category}</span>` : '';
  return `<div class="weapon-profile-row">
    <span class="wp-mode">${w.modes}</span> &nbsp;
    <span class="wp-dmg">${w.damage}</span> &nbsp;
    <span class="wp-range">S:${w.short} M:${w.medium} L:${w.long}</span>${catBadge}${ceBadge}
  </div>`;
}

// ============================================================
// INTERACTIONS
// ============================================================
function streetThugFOPUsed(excludeUid) {
  return roster
    .filter(e => e.templateId === 'street-thug' && e.uid !== excludeUid)
    .reduce((s, e) => s + calcEntryFOP(e), 0);
}

function streetThugCapReached(entry, newModels) {
  // Returns true if giving entry newModels models would exceed 50% of budget
  const template = entry.template;
  const proposed = template.fopPerModel * newModels;
  const others = streetThugFOPUsed(entry.uid);
  return (proposed + others) > budget * 0.5;
}

function changeModels(uid, delta) {
  const entry = roster.find(e => e.uid === uid);
  if (!entry) return;
  const t = entry.template;
  if (entry.formation === 'individual') return;
  const min = t.coordinated ? t.coordinated[0] : 1;
  const max = t.coordinated ? t.coordinated[1] : 1;
  const newModels = Math.max(min, Math.min(max, entry.models + delta));

  // Enforce Street Thug 50% cap when adding models
  if (t.id === 'street-thug' && delta > 0 && streetThugCapReached(entry, newModels)) {
    renderAlerts(roster.reduce((s,e) => s + calcEntryFOP(e), 0), budget - roster.reduce((s,e) => s + calcEntryFOP(e), 0));
    return;
  }

  entry.models = newModels;
  if (entry.equipMode === 'individual') buildModelWeapons(entry);
  renderRoster();
}

function updateWeapon(uid, slot, value) {
  const entry = roster.find(e => e.uid === uid);
  if (!entry) return;
  if (slot === 'primary') entry.selectedPrimary = value || null;
  if (slot === 'secondary') entry.selectedSecondary = value || null;
  if (slot === 'melee') entry.selectedMelee = value;
  if (slot === 'support') entry.selectedSupport = value || null;
  renderRoster();
}

function toggleUpgrade(uid, upgradeId) {
  const entry = roster.find(e => e.uid === uid);
  if (!entry) return;
  entry.activeUpgrades[upgradeId] = !entry.activeUpgrades[upgradeId];
  renderRoster();
}

// ============================================================
// ALERTS
// ============================================================
function renderAlerts(total, remaining) {
  const container = document.getElementById('alerts');
  const alerts = [];

  // Over budget
  if (remaining < 0) {
    alerts.push({ type: 'error', msg: `Over budget by ${Math.abs(remaining)} FOP` });
  } else if (remaining === 0) {
    alerts.push({ type: 'ok', msg: 'Budget fully allocated' });
  }

  // Street Thug 50% cap
  const streetThugFOP = roster.filter(e => e.templateId === 'street-thug').reduce((s,e) => s + calcEntryFOP(e), 0);
  if (streetThugFOP > budget * 0.5) {
    alerts.push({ type: 'error', msg: `Street Thugs exceed 50% FOP cap — ${streetThugFOP} spent / ${Math.floor(budget*0.5)} max` });
  } else if (streetThugFOP > 0) {
    alerts.push({ type: 'ok', msg: `Street Thugs: ${streetThugFOP} / ${Math.floor(budget*0.5)} FOP (50% cap)` });
  }

  // Hired Gun cap (max 1 per Breacher — user sets budget per Breacher)
  const hgCount = roster.filter(e => e.template.type === 'hired-gun' || e.template.type === 'named-hg').length;
  if (hgCount > 1) {
    alerts.push({ type: 'warn', msg: `${hgCount} Hired Guns present — max 1 per Breacher in Operation` });
  }

  // Concealed budget 25%
  const concealedFOP = roster.filter(e => e.activeUpgrades['concealed'] || e.template.concealed).reduce((s,e) => s + calcEntryFOP(e), 0);
  if (concealedFOP > budget * 0.25) {
    alerts.push({ type: 'warn', msg: `Concealed units exceed 25% of budget (${concealedFOP} / ${Math.floor(budget*0.25)} max)` });
  }

  container.innerHTML = alerts.map(a =>
    `<div class="alert alert-${a.type}">${a.msg}</div>`
  ).join('');
}

function showPrintView() {
  if (roster.length === 0) { alert('No units in roster.'); return; }
  const total = roster.reduce((s,e) => s + calcEntryFOP(e), 0);

  let lines = [`BREACHER — OPFOR ROSTER\nBudget: ${budget} FOP | Spent: ${total} FOP | Remaining: ${budget-total} FOP\n`];
  lines.push('='.repeat(56));
  roster.forEach((entry, idx) => {
    const t = entry.template;
    const fop = calcEntryFOP(entry);
    lines.push(`\n${idx+1}. ${t.name.toUpperCase()} — ${entry.formation.toUpperCase()} (${fop} FOP)`);
    lines.push(`   Models: ${entry.formation === 'individual' ? 1 : entry.models} | MOV:${t.stats.MOV} RC:${t.stats.RC} MC:${t.stats.MC} TECH:${t.stats.TECH} WND:${t.stats.WND} ARM:${t.stats.ARM}`);
    if (entry.equipMode === 'individual' && entry.modelWeapons?.length) {
      entry.modelWeapons.forEach((mw, i) => {
        lines.push(`   Model ${i+1}: Primary: ${mw.primary||'—'} | Melee: ${mw.melee||'—'} | Secondary: ${mw.secondary||'—'}`);
      });
    } else {
      if (entry.selectedPrimary) lines.push(`   Primary: ${entry.selectedPrimary}`);
      if (entry.selectedMelee) lines.push(`   Melee 1: ${entry.selectedMelee}`);
      if (entry.selectedMelee2) lines.push(`   Melee 2: ${entry.selectedMelee2}`);
      if (entry.selectedSecondary) lines.push(`   Secondary: ${entry.selectedSecondary}`);
    }
    if (entry.selectedSupport) lines.push(`   Support: ${entry.selectedSupport}`);
    const upgrades = Object.keys(entry.activeUpgrades).filter(k => entry.activeUpgrades[k]);
    if (upgrades.length) lines.push(`   Upgrades: ${upgrades.join(', ')}`);
  });
  lines.push('\n' + '='.repeat(56));

  const win = window.open('', '_blank');
  win.document.write(`<pre style="font-family:monospace;background:#f5f5f6;color:#1a1a1e;padding:20px;white-space:pre-wrap;">${lines.join('\n')}</pre>`);
  win.document.close();
}

function saveBreacher() {
  if (!bState.specialtyId) { alert('No Breacher configured to save.'); return; }
  const data = JSON.stringify({ version: 1, type: 'breacher', state: bState }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const name = (bState.name || 'breacher').replace(/[^a-z0-9]/gi, '_').toLowerCase();
  a.download = `breacher_${name}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadBreacherTrigger() {
  document.getElementById('breacher-load-input').value = '';
  document.getElementById('breacher-load-input').click();
}

function loadBreacher(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.type !== 'breacher') { alert('This file is not a Breacher save.'); return; }
      // Validate specialtyId exists
      const spec = SPECIALTIES.find(s => s.id === data.state.specialtyId);
      if (!spec) { alert('Specialty not found — file may be from an older version.'); return; }
      Object.assign(bState, data.state);
      renderSpecialtyLibrary();
      renderBreachers();
      updateCE();
    } catch (err) {
      alert('Could not load file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ============================================================
// SAVE / LOAD — OPFOR ROSTER
// ============================================================
function saveRoster() {
  if (roster.length === 0) { alert('Roster is empty.'); return; }
  // Serialise roster — strip template object (it's reconstructable from templateId)
  const saveable = roster.map(e => ({
    uid: e.uid,
    templateId: e.templateId,
    formation: e.formation,
    models: e.models,
    selectedPrimary: e.selectedPrimary,
    selectedSecondary: e.selectedSecondary,
    selectedMelee: e.selectedMelee,
    selectedMelee2: e.selectedMelee2,
    selectedSupport: e.selectedSupport,
    activeUpgrades: e.activeUpgrades,
    equipMode: e.equipMode,
    modelWeapons: e.modelWeapons,
  }));
  const data = JSON.stringify({ version: 1, type: 'opfor', budget, roster: saveable }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `opfor_roster.json`;
  a.click();
  URL.revokeObjectURL(a.href);
}

function loadRosterTrigger() {
  document.getElementById('roster-load-input').value = '';
  document.getElementById('roster-load-input').click();
}

function loadRoster(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.type !== 'opfor') { alert('This file is not an OPFOR roster save.'); return; }
      // Restore budget
      budget = data.budget || 20;
      document.getElementById('budget-input').value = budget;
      // Reconstruct roster entries with template references
      const allUnits = [...UNITS, ...PREMADE_HG];
      roster = [];
      let maxUid = 0;
      for (const saved of data.roster) {
        const template = allUnits.find(u => u.id === saved.templateId);
        if (!template) { console.warn('Unknown unit id:', saved.templateId); continue; }
        const entry = {
          uid: saved.uid,
          templateId: saved.templateId,
          template,
          formation: saved.formation,
          models: saved.models,
          selectedPrimary: saved.selectedPrimary ?? null,
          selectedSecondary: saved.selectedSecondary ?? null,
          selectedMelee: saved.selectedMelee ?? null,
          selectedMelee2: saved.selectedMelee2 ?? null,
          selectedSupport: saved.selectedSupport ?? null,
          activeUpgrades: saved.activeUpgrades ?? {},
          equipMode: saved.equipMode ?? 'all',
          modelWeapons: saved.modelWeapons ?? [],
        };
        roster.push(entry);
        if (saved.uid > maxUid) maxUid = saved.uid;
      }
      nextId = maxUid + 1;
      renderRoster();
      updateFOP();
    } catch (err) {
      alert('Could not load file: ' + err.message);
    }
  };
  reader.readAsText(file);
}

let bState = {
  name: '',
  specialtyId: null,
  loadoutId: 'A',
  subAgency: 'None / Independent',
  primaryWeapon: null,
  secondaryWeapon: null,
  meleeWeapon: null,
  meleeWeapon2: null,

let specFilter = 'all';

// ============================================================
// RENDER SPECIALTY LIBRARY
// ============================================================
function renderSpecialtyLibrary() {
  const container = document.getElementById('specialty-library');
  const filtered = specFilter === 'all' ? SPECIALTIES : SPECIALTIES.filter(s => s.name === specFilter);
  container.innerHTML = '';

  filtered.forEach(spec => {
    const card = document.createElement('div');
    card.className = 'spec-card' + (bState.specialtyId === spec.id ? ' selected' : '');
    const ceRange = spec.loadouts.map(l => {
      const mods = l.mods.join(', ');
      return mods;
    }).join(' / ');
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div class="spec-card-name">${spec.name}</div>
        <div class="spec-card-ce">Base CE: ${spec.baseCE}</div>
      </div>
      <div class="unit-stats-mini" style="margin-top:6px;">
        <div class="stat-pill"><span class="stat-pill-label">MOV</span><span class="stat-pill-val">${spec.stats.MOV}</span></div>
        <div class="stat-pill"><span class="stat-pill-label">RC</span><span class="stat-pill-val">${spec.stats.RC}</span></div>
        <div class="stat-pill"><span class="stat-pill-label">MC</span><span class="stat-pill-val">${spec.stats.MC}</span></div>
        <div class="stat-pill"><span class="stat-pill-label">TECH</span><span class="stat-pill-val">${spec.stats.TECH}</span></div>
        <div class="stat-pill"><span class="stat-pill-label">CMD</span><span class="stat-pill-val">${spec.stats.CMD}</span></div>
        <div class="stat-pill"><span class="stat-pill-label">WND</span><span class="stat-pill-val">${spec.stats.WND}</span></div>
      </div>

    `;
    card.addEventListener('click', () => selectSpecialty(spec.id));
    container.appendChild(card);
  });
}

function selectSpecialty(id) {
  bState.specialtyId = id;
  const spec = SPECIALTIES.find(s => s.id === id);
  bState.loadoutId = 'A';
  bState.primaryWeapon = null;
  bState.secondaryWeapon = null;
  bState.meleeWeapon = spec.meleePool[0] || null;
  bState.meleeWeapon2 = spec.dualMelee ? (spec.meleePool[1] || spec.meleePool[0]) : null;
  bState.grenadeItems = [];
  renderSpecialtyLibrary();
  renderBreachers();
  updateCE();
}

// ============================================================
// RENDER BREACHER SHEET
// ============================================================
function renderBreachers() {
  const sheet = document.getElementById('breacher-sheet');

  if (!bState.specialtyId) {
    sheet.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-faint);gap:10px;">
        <div style="font-size:48px;opacity:0.3;">⚡</div>
        <div style="font-family:Oswald,sans-serif;font-size:13px;letter-spacing:3px;text-transform:uppercase;">Select a Specialty</div>
      </div>`;
    return;
  }

  const spec = SPECIALTIES.find(s => s.id === bState.specialtyId);
  const loadout = spec.loadouts.find(l => l.id === bState.loadoutId) || spec.loadouts[0];

  // Effective movement
  let movMod = 0;
  loadout.mods.forEach(m => {
    if (m === 'Movement +1') movMod = 1;
    if (m === 'Movement -1') movMod = -1;
  });
  const movEff = (parseInt(spec.stats.MOV) + movMod) + '"';

  // Stats
  const statsRows = [
    { label: 'Movement',      val: movEff,        highlight: movMod !== 0 },
    { label: 'Ranged Combat', val: spec.stats.RC  },
    { label: 'Melee Combat',  val: spec.stats.MC  },
    { label: 'Technical',     val: spec.stats.TECH},
    { label: 'Command',       val: spec.stats.CMD },
    { label: 'Wounds',        val: spec.stats.WND },
    { label: 'Grit',          val: bState.grit > 0 ? bState.grit : '—' },
    { label: 'Armor',         val: loadout.armor  },
  ].map(r =>
    `<div class="b-stat-row">
      <span class="b-stat-label">${r.label}</span>
      <span class="b-stat-val${r.highlight ? ' highlight' : ''}">${r.val}</span>
    </div>`
  ).join('');

  // Loadout buttons — use data-loadout attribute, no inline onclick
  const loadoutBtns = spec.loadouts.map(l =>
    `<button class="b-loadout-btn${bState.loadoutId === l.id ? ' selected' : ''}" data-loadout="${l.id}">
      <strong>${l.label}</strong><br>
      Armor: ${l.armor} | Reloads: ${l.reloads}<br>
      Grenades: ${l.grenades} | Gear: ${l.tacticalGear} slots<br>
      ${l.mods.join(', ')}
    </button>`
  ).join('');

  // Weapons
  const esc = v => v.replace(/"/g, '&quot;');
  const primaryOpts   = spec.primaryPool.map(w => `<option value="${esc(w)}"${bState.primaryWeapon===w?' selected':''}>${w}</option>`).join('');
  const secOpts       = spec.secondaryPool.map(w => `<option value="${esc(w)}"${bState.secondaryWeapon===w?' selected':''}>${w}</option>`).join('');
  const meleeOpts     = spec.meleePool.map(w => `<option value="${esc(w)}"${bState.meleeWeapon===w?' selected':''}>${w}</option>`).join('');
  const melee2Opts    = spec.dualMelee ? spec.meleePool.map(w => `<option value="${esc(w)}"${bState.meleeWeapon2===w?' selected':''}>${w}</option>`).join('') : '';

  let weaponHtml =
    `<div class="b-weapon-row">
      <div class="config-section-label">Primary</div>
      <select class="config-select" style="width:100%;" data-weapon="primary"><option value="">— None —</option>${primaryOpts}</select>
      ${bState.primaryWeapon ? renderWeaponProfile(bState.primaryWeapon) : ''}
    </div>
    <div class="b-weapon-row">
      <div class="config-section-label">Melee</div>
      <select class="config-select" style="width:100%;" data-weapon="melee">${meleeOpts}</select>
      ${bState.meleeWeapon ? renderWeaponProfile(bState.meleeWeapon) : ''}
    </div>`;
  if (spec.dualMelee) {
    weaponHtml +=
      `<div class="b-weapon-row">
        <div class="config-section-label">Melee 2</div>
        <select class="config-select" style="width:100%;" data-weapon="melee2">${melee2Opts}</select>
        ${bState.meleeWeapon2 ? renderWeaponProfile(bState.meleeWeapon2) : ''}
      </div>`;
  }
  weaponHtml +=
    `<div class="b-weapon-row">
      <div class="config-section-label">Secondary</div>
      <select class="config-select" style="width:100%;" data-weapon="secondary"><option value="">— None —</option>${secOpts}</select>
      ${bState.secondaryWeapon ? renderWeaponProfile(bState.secondaryWeapon) : ''}
    </div>`;


  // Special rules
  const rulesHtml = spec.specialRules.map((r,i) => `<p><strong>${i+1}.</strong> ${r}</p>`).join('');

  // Sub-agency
  const agencyMvrs = SUB_AGENCY_MANEUVERS[bState.subAgency];
  const agencyHtml = agencyMvrs ? agencyMvrs.map(m =>
    `<div style="margin-bottom:8px;padding:6px 8px;background:#dedede;border-left:2px solid var(--accent);">
      <div style="font-family:Oswald,sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:2px;">${m.name} <span style="color:var(--text-dim);">(${m.cost})</span></div>
      <div style="font-size:11px;color:var(--text);">${m.desc}</div>
    </div>`
  ).join('') : '<div style="font-size:11px;color:var(--text-dim);">No sub-agency selected.</div>';

  const agencyOpts = SUB_AGENCIES.map(a =>
    `<option value="${esc(a)}"${bState.subAgency===a?' selected':''}>${a}</option>`
  ).join('');

  sheet.innerHTML =
    `<div class="b-name-row">
      <input class="b-name-input" placeholder="BREACHER NAME" value="${esc(bState.name)}" data-field="name">
      <div class="b-specialty-badge">${spec.name}</div>
    </div>

    <div class="b-campaign-row" style="margin-top:10px;">
      <div class="b-campaign-field">
        <span class="b-campaign-label">Grit (0–3)</span>
        <input class="b-campaign-input" type="number" min="0" max="3" value="${bState.grit}" data-field="grit">
      </div>
      <div class="b-campaign-field">
        <span class="b-campaign-label">Crypto Available</span>
        <input class="b-campaign-input" type="number" min="0" value="${bState.cryptoAvail}" data-field="cryptoAvail">
      </div>
      <div class="b-campaign-field">
        <span class="b-campaign-label">Crypto Spent</span>
        <input class="b-campaign-input" type="number" min="0" value="${bState.cryptoSpent}" data-field="cryptoSpent">
      </div>
      <div class="b-campaign-field" style="flex:1;">
        <span class="b-campaign-label">Injuries</span>
        <input class="b-injuries-input" placeholder="None" value="${esc(bState.injuries)}" data-field="injuries">
      </div>
    </div>

    <div class="breacher-sheet-grid">
      <div class="b-stats-col">
        <div class="b-section-title">Stats</div>
        ${statsRows}
      </div>
      <div class="b-right-col">
        <div class="b-loadout-card">
          <div class="b-section-title">Loadout — Choose One</div>
          <div class="b-loadout-options">${loadoutBtns}</div>
          <div class="b-loadout-detail">
            <strong>Armor:</strong> ${loadout.armor} &nbsp;|&nbsp;
            <strong>Reloads:</strong> ${loadout.reloads} &nbsp;|&nbsp;
            <strong>Grenades:</strong> ${loadout.grenades} slot${loadout.grenades!==1?'s':''} &nbsp;|&nbsp;
            <strong>Tactical Gear:</strong> ${loadout.tacticalGear} slot${loadout.tacticalGear!==1?'s':''}
          </div>
        </div>
        <div class="b-weapons-card">
          <div class="b-section-title">Weapons</div>
          ${weaponHtml}
        </div>
        ${renderGearSection(loadout.tacticalGear)}
        ${renderGrenadeSection(loadout.grenades)}
        <div class="b-special-rules">
          <div class="b-section-title">Special Rules</div>
          ${rulesHtml}
        </div>
        <div class="b-loadout-card">
          <div class="b-section-title">Sub-Agency</div>
          <select class="b-sub-agency-select" data-field="subAgency">${agencyOpts}</select>
          ${agencyHtml}
        </div>
      </div>
    </div>`;

  // Attach all events via delegation on the sheet container
  attachBreachers(sheet, spec);
}

function attachBreachers(sheet, spec) {
  // Loadout buttons
  sheet.querySelectorAll('[data-loadout]').forEach(btn => {
    btn.addEventListener('click', () => {
      bState.loadoutId = btn.dataset.loadout;
      renderBreachers();
      updateCE();
    });
  });

  // Weapon selects
  sheet.querySelectorAll('[data-weapon]').forEach(sel => {
    sel.addEventListener('change', () => {
      bUpdateWeapon(sel.dataset.weapon, sel.value);
    });
  });

  // Gear items
  sheet.querySelectorAll('[data-gear]').forEach(el => {
    el.addEventListener('click', () => { toggleGear(el.dataset.gear); });
  });

  // Grenade items
  sheet.querySelectorAll('[data-grenade]').forEach(el => {
    el.addEventListener('click', () => { toggleGrenade(el.dataset.grenade); });
  });

  // Text/number inputs
  sheet.querySelectorAll('[data-field]').forEach(inp => {
    inp.addEventListener('input', () => {
      const f = inp.dataset.field;
      if (f === 'grit') {
        bState.grit = Math.min(3, Math.max(0, parseInt(inp.value) || 0));
        renderBreachers();
      } else if (f === 'cryptoSpent') {
        bState.cryptoSpent = parseInt(inp.value) || 0;
        updateCE();
      } else if (f === 'cryptoAvail') {
        bState.cryptoAvail = parseInt(inp.value) || 0;
      } else if (f === 'subAgency') {
        bState.subAgency = inp.value;
        renderBreachers();
      } else {
        bState[f] = inp.value;
      }
    });
  });
}

function selectLoadout(id) {
  bState.loadoutId = id;
  renderBreachers();
  updateCE();
}

function bUpdateWeapon(slot, val) {
  if (slot === 'primary') bState.primaryWeapon = val || null;
  if (slot === 'secondary') bState.secondaryWeapon = val || null;
  if (slot === 'melee') bState.meleeWeapon = val;
  if (slot === 'melee2') bState.meleeWeapon2 = val;
  renderBreachers();
  updateCE();
}

function updateCE() {
  if (!bState.specialtyId) { document.getElementById('ce-display').textContent = '—'; return; }
  const spec = SPECIALTIES.find(s => s.id === bState.specialtyId);
  const loadout = spec.loadouts.find(l => l.id === bState.loadoutId) || spec.loadouts[0];
  let ce = spec.baseCE;

  // Loadout CE modifier
  loadout.mods.forEach(m => {
    const match = m.match(/CE \+(\d+)/);
    if (match) ce += parseInt(match[1]);
  });

  // CE from selected weapons
  const selectedWeapons = [bState.primaryWeapon, bState.secondaryWeapon, bState.meleeWeapon, bState.meleeWeapon2].filter(Boolean);
  selectedWeapons.forEach(wName => {
    const w = WEAPONS[wName];
    if (w && w.ce) ce += w.ce;
  });

  // CE from tactical gear
  ce += gearCEBonus();

  // Each 2 crypto spent = +1 CE from specialty maneuvers/grit purchases
  ce += Math.floor(bState.cryptoSpent / 2);

  document.getElementById('ce-display').textContent = ce;
}


// ============================================================
// TACTICAL GEAR HELPERS
// ============================================================
function gearSlotsUsed() {
  return bState.gearItems.reduce((sum, id) => {
    const g = TACTICAL_GEAR.find(x => x.id === id);
    return sum + (g ? g.slots : 0);
  }, 0);
}

function gearCEBonus() {
  return bState.gearItems.reduce((sum, id) => {
    const g = TACTICAL_GEAR.find(x => x.id === id);
    return sum + (g ? g.ce : 0);
  }, 0);
}


// ============================================================
// GRENADE HELPERS
// ============================================================
function grenadeSlotsUsed() {
  return bState.grenadeItems.reduce((sum, id) => {
    const g = GRENADES.find(x => x.id === id);
    return sum + (g ? g.slots : 0);
  }, 0);
}

function toggleGrenade(id) {
  const idx = bState.grenadeItems.indexOf(id);
  if (idx >= 0) {
    bState.grenadeItems.splice(idx, 1);
  } else {
    bState.grenadeItems.push(id);
  }
  renderBreachers();
}

function renderGrenadeSection(maxSlots) {
  const used = grenadeSlotsUsed();
  const countCls = used > maxSlots ? 'over' : used >= maxSlots ? 'warn' : 'ok';

  const totalPips = Math.max(maxSlots, used);
  let pips = '';
  for (let i = 0; i < totalPips; i++) {
    const cls = i < used ? (used > maxSlots ? 'over' : 'used') : '';
    pips += `<div class="b-slot-pip ${cls}"></div>`;
  }

  const items = GRENADES.map(g => {
    const sel = bState.grenadeItems.includes(g.id);
    const slotBadgeCls = g.slots === 2 ? 'two' : '';
    const slotLabel = g.slots === 2 ? '2 slots' : '1 slot';
    return `<div class="b-grenade-item${sel ? ' selected' : ''}" data-grenade="${g.id}">
      <div class="b-grenade-check">${sel ? '✓' : ''}</div>
      <div style="flex:1;min-width:0;">
        <div class="b-grenade-name">
          ${g.name}
          <span class="b-grenade-badge ${slotBadgeCls}">${slotLabel}</span>
          <span class="b-grenade-badge">BL: ${g.blast}</span>
          <span class="b-grenade-badge" style="color:var(--amber);border-color:var(--amber);">${g.damage}</span>
          <span class="b-grenade-badge" style="color:var(--green);border-color:var(--green);">${g.duration}</span>
        </div>
        <div class="b-grenade-stats">
          <span>Range: ${g.range}</span>
          <span>${g.effect}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  return `<div class="b-grenade-section">
    <div class="b-section-title">Grenades</div>
    <div class="b-gear-slot-bar">
      <div class="b-slot-label">Slots</div>
      <div class="b-slot-pips">${pips}</div>
      <div class="b-slot-count ${countCls}">${used} / ${maxSlots}</div>
    </div>
    <div class="b-grenade-grid">${items}</div>
  </div>`;
}

function toggleGear(id) {
  const idx = bState.gearItems.indexOf(id);
  if (idx >= 0) {
    bState.gearItems.splice(idx, 1);
  } else {
    bState.gearItems.push(id);
  }
  renderBreachers();
  updateCE();
}

function renderGearSection(maxSlots) {
  const used = gearSlotsUsed();
  const remaining = maxSlots - used;

  // Slot pips
  const totalPips = Math.max(maxSlots, used);
  let pips = '';
  for (let i = 0; i < totalPips; i++) {
    const cls = i < used ? (used > maxSlots ? 'over' : 'used') : '';
    pips += `<div class="b-slot-pip ${cls}"></div>`;
  }

  const countCls = used > maxSlots ? 'over' : used >= maxSlots - 1 ? 'warn' : 'ok';

  // Gear grid — use data-gear attribute, no inline onclick
  const gridItems = TACTICAL_GEAR.map(g => {
    const sel = bState.gearItems.includes(g.id);
    const ceClass = g.ce !== 0 ? 'ce-item' : '';
    const slotBadgeCls = g.slots === 2 ? 'two' : '';
    const slotLabel = g.slots === 0 ? 'special' : g.slots === 2 ? '2 slots' : '1 slot';
    const ceBadge = g.ce !== 0 ? `<span class="b-gear-ce-badge">${g.ce > 0 ? '+' : ''}${g.ce} CE</span>` : '';
    return `<div class="b-gear-item ${sel ? 'selected' : ''} ${ceClass}" data-gear="${g.id}">
        <div class="b-gear-check">${sel ? '✓' : ''}</div>
        <div class="b-gear-info">
          <div class="b-gear-name">
            ${g.name}
            <span class="b-gear-slots-badge ${slotBadgeCls}">${slotLabel}</span>
            ${ceBadge}
          </div>
          <div class="b-gear-effect">${g.effect}</div>
        </div>
      </div>`;
  }).join('');

  // Selected tags — also data-gear
  const tags = bState.gearItems.map(id => {
    const g = TACTICAL_GEAR.find(x => x.id === id);
    if (!g) return '';
    return `<div class="b-gear-tag" data-gear="${g.id}" title="Click to remove">${g.name} <span class="remove-x">✕</span></div>`;
  }).join('');

  return `
    <div class="b-gear-section">
      <div class="b-section-title">Tactical Gear</div>
      <div class="b-gear-slot-bar">
        <div class="b-slot-label">Slots</div>
        <div class="b-slot-pips">${pips}</div>
        <div class="b-slot-count ${countCls}">${used} / ${maxSlots}</div>
      </div>
      <div class="b-gear-grid">${gridItems}</div>
      ${tags ? '<div class="b-gear-selected-list">' + tags + '</div>' : ''}
    </div>
  `;
}

function resetBreacher() {
  if (!confirm('Reset Breacher sheet?')) return;
  bState = { name:'', specialtyId:null, loadoutId:'A', subAgency:'None / Independent', primaryWeapon:null, secondaryWeapon:null, meleeWeapon:null, meleeWeapon2:null, grit:0, cryptoAvail:0, cryptoSpent:0, injuries:'', gearItems:[], grenadeItems:[] };
  renderSpecialtyLibrary();
  renderBreachers();
  updateCE();
}

function exportBreacher() {
  if (!bState.specialtyId) { alert('No Breacher configured.'); return; }
  const spec = SPECIALTIES.find(s => s.id === bState.specialtyId);
  const loadout = spec.loadouts.find(l => l.id === bState.loadoutId) || spec.loadouts[0];
  let movMod = 0;
  loadout.mods.forEach(m => { if (m==='Movement +1') movMod=1; if (m==='Movement -1') movMod=-1; });
  const movEff = (parseInt(spec.stats.MOV)+movMod)+'"';
  const lines = [
    `BREACHER SHEET`,
    `Name: ${bState.name || '(unnamed)'}  |  Specialty: ${spec.name}  |  Sub-Agency: ${bState.subAgency}`,
    `CE: ${document.getElementById('ce-display').textContent}  |  Crypto Available: ${bState.cryptoAvail}  |  Crypto Spent: ${bState.cryptoSpent}`,
    '='.repeat(56),
    `STATS`,
    `Movement: ${movEff}  RC: ${spec.stats.RC}  MC: ${spec.stats.MC}  TECH: ${spec.stats.TECH}  CMD: ${spec.stats.CMD}`,
    `Wounds: ${spec.stats.WND}  Grit: ${bState.grit}  Armor: ${loadout.armor}`,
    `LOADOUT ${loadout.id}: Reloads: ${loadout.reloads} | Grenades: ${loadout.grenades} | Gear: ${loadout.tacticalGear} slots`,
    `Gear Slots Used: ${gearSlotsUsed()} / ${loadout.tacticalGear}`,
    `Tactical Gear: ${bState.gearItems.length ? bState.gearItems.map(id => { const g = TACTICAL_GEAR.find(x => x.id === id); return g ? g.name : id; }).join(', ') : 'None'}`,
    `WEAPONS`,
    `Primary: ${bState.primaryWeapon || '—'}`,
    `Melee: ${bState.meleeWeapon || '—'}${bState.meleeWeapon2 ? ' / '+bState.meleeWeapon2 : ''}`,
    `Secondary: ${bState.secondaryWeapon || '—'}`,
    `Injuries: ${bState.injuries || 'None'}`,
    '='.repeat(56),
    `SPECIAL RULES`,
    ...spec.specialRules.map((r,i) => `${i+1}. ${r}`),
  ];
  const win = window.open('', '_blank');
  win.document.write(`<pre style="font-family:monospace;background:#f5f5f6;color:#1a1a1e;padding:20px;white-space:pre-wrap;">${lines.join('\n')}</pre>`);
  win.document.close();
}

// Specialty filter tabs
document.querySelectorAll('[data-spec-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-spec-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    specFilter = btn.dataset.specFilter;
    renderSpecialtyLibrary();
  });
});

// Init Breacher tab
renderSpecialtyLibrary();
renderBreachers();
updateCE();
// Start on Breacher tab
switchTab('breacher');

</script>
</body>
</html>
